version: "3.9"

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: fpl-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fpl-kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 48
      KAFKA_MESSAGE_MAX_BYTES: 10485760
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fpl-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fpl.raw.bootstrap --partitions 1 --replication-factor 1 --config retention.ms=86400000
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fpl.raw.fixtures --partitions 1 --replication-factor 1 --config retention.ms=604800000
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fpl.raw.player.history --partitions 8 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fpl.raw.league.standings --partitions 4 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fpl.raw.team --partitions 4 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fpl.raw.live --partitions 2 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fpl.analytics.request --partitions 4 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fpl.analytics.computed --partitions 4 --replication-factor 1 --config retention.ms=172800000
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fpl.ollama.request --partitions 2 --replication-factor 1 --config retention.ms=3600000
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fpl.ollama.response --partitions 2 --replication-factor 1 --config retention.ms=3600000
      echo 'All topics created successfully.'
      "
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: fpl-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  mongodb:
    image: mongo:7.0.8
    container_name: fpl-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: fpl
      MONGO_INITDB_ROOT_PASSWORD: fpl_secret
      MONGO_INITDB_DATABASE: fpl_analytics
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo/init-indexes.js:/docker-entrypoint-initdb.d/01-init-indexes.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  zipkin:
    image: openzipkin/zipkin:3.4.1
    container_name: fpl-zipkin
    ports:
      - "9411:9411"
    environment:
      STORAGE_TYPE: mem
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9411/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:0.3.6
    container_name: fpl-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ollama-init:
    image: curlimages/curl:8.8.0
    container_name: fpl-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "echo 'Pulling Ollama model mistral:7b-instruct-v0.2 (this may take a while)...'
      curl -s http://ollama:11434/api/pull -d '{\"name\":\"mistral:7b-instruct-v0.2\"}' --max-time 600
      echo 'Model pull complete.'"
    restart: "no"

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  mongo-data:
  ollama-models:
